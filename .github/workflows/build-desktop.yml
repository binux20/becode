name: Build Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install ImageMagick and create ICO
        run: |
          choco install imagemagick -y --no-progress
          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          # Find magick executable
          $magickPath = Get-Command magick -ErrorAction SilentlyContinue
          if (-not $magickPath) {
            $magickPath = "C:\ProgramData\chocolatey\bin\magick.exe"
          }
          Write-Host "Using ImageMagick at: $magickPath"
          # Create ICO with multiple sizes
          & $magickPath convert src-tauri/icons/icon.png -resize 256x256 -define icon:auto-resize=256,128,64,48,32,16 src-tauri/icons/icon.ico
          # Verify creation
          if (Test-Path src-tauri/icons/icon.ico) {
            $size = (Get-Item src-tauri/icons/icon.ico).Length
            Write-Host "ICO created successfully: $size bytes"
          } else {
            Write-Host "ICO creation failed - file not found"
            exit 1
          }
          Write-Host "Icons directory contents:"
          Get-ChildItem src-tauri/icons/
        shell: pwsh

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build Tauri App
        run: cargo tauri build --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: List build output
        run: |
          echo "=== Release folder ==="
          dir target\release\*.exe
          echo "=== Bundle folder ==="
          dir target\release\bundle\ /s
        shell: cmd
        continue-on-error: true

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCode-Windows-MSI
          path: target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeCode-Windows-NSIS
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: BeCode-Windows-Portable
          path: target/release/becode-desktop.exe
          if-no-files-found: warn
